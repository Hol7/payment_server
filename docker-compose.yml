

services:

  postgres:
    image: postgres:15
    container_name: gateway_postgres
    restart: always
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gateway:
    build: .
    container_name: gateway_app
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USER: gateway
      DB_PASS: gateway
      DB_NAME: gateway_dev
    ports:
      - "4000:4000"
    command: mix phx.server

volumes:
  postgres_data: